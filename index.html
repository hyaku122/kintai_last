<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#182A5B" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="刻の標" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="stylesheet.css" />
  <title>刻の標</title>
</head>

<body>
  <header class="topbar">
    <button id="todayCalendar" class="today-calendar" type="button" aria-label="今日の日付へ移動"></button>

    <div class="topbar-right">
      <button id="refreshButton" class="icon-button refresh-button" type="button" aria-label="最新情報に更新">
        <svg class="refresh-svg" viewBox="0 0 64 64" width="28" height="28" aria-hidden="true" focusable="false">
          <path class="icon-glint icon-glint-gold" d="M16 8.5c.8 3.2 1.8 4.2 5 5c-3.2.8-4.2 1.8-5 5c-.8-3.2-1.8-4.2-5-5c3.2-.8 4.2-1.8 5-5z"/>
          <path class="refresh-loop refresh-loop-back" d="M45.5 18.5c-4.4-4.7-11.1-7-17.8-5.7c-10.7 2.1-17.7 12.4-15.6 23.1"/>
          <path class="refresh-loop refresh-loop-front" d="M18.5 45.5c4.4 4.7 11.1 7 17.8 5.7c10.7-2.1 17.7-12.4 15.6-23.1"/>
          <path class="refresh-arrow refresh-arrow-top" d="M45.5 10.2l5.3 9.5l-10.9.7z"/>
          <path class="refresh-arrow refresh-arrow-bottom" d="M18.5 53.8l-5.3-9.5l10.9-.7z"/>
        </svg>
      </button>

      <div class="topbar-action-stack">
        <button id="settingsButton" class="icon-button settings-button" type="button" aria-label="設定">
          <svg class="settings-svg" viewBox="0 0 64 64" width="28" height="28" aria-hidden="true" focusable="false">
            <path class="icon-glint icon-glint-gold" d="M50.5 9c.7 2.9 1.6 3.8 4.5 4.5c-2.9.7-3.8 1.6-4.5 4.5c-.7-2.9-1.6-3.8-4.5-4.5c2.9-.7 3.8-1.6 4.5-4.5z"/>
            <path class="settings-gear" d="M29 8.8h6l1.5 7.4c1.8.5 3.5 1.2 5.1 2.1l6.3-4.2l4.2 4.2l-4.2 6.3c.9 1.6 1.6 3.3 2.1 5.1l7.4 1.5v6L50 38.7c-.5 1.8-1.2 3.5-2.1 5.1l4.2 6.3l-4.2 4.2l-6.3-4.2c-1.6.9-3.3 1.6-5.1 2.1L35 59.6h-6l-1.5-7.4c-1.8-.5-3.5-1.2-5.1-2.1l-6.3 4.2l-4.2-4.2l4.2-6.3c-.9-1.6-1.6-3.3-2.1-5.1l-7.4-1.5v-6l7.4-1.5c.5-1.8 1.2-3.5 2.1-5.1l-4.2-6.3l4.2-4.2l6.3 4.2c1.6-.9 3.3-1.6 5.1-2.1L29 8.8z"/>
            <circle class="settings-center" cx="32" cy="34.2" r="10.6"/>
          </svg>
        </button>

        <button id="yearSummaryButton" class="year-summary-button tabnums" type="button">2026年まとめ</button>
        <div class="year-switcher" aria-label="年切り替え">
          <button id="previousYearButton" class="year-switch-button year-switch-button-prev" type="button" aria-label="前年に移動">
            <span class="year-switch-triangle" aria-hidden="true"></span>
          </button>
          <button id="nextYearButton" class="year-switch-button year-switch-button-next" type="button" aria-label="次年に移動">
            <span class="year-switch-triangle" aria-hidden="true"></span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <nav class="month-tabs month-tabs-top" aria-label="月タブ">
    <div id="monthTabsTopInner" class="month-tabs-inner"></div>
  </nav>

  <main class="main">
    <section id="summarySection" class="summary" aria-label="月次集計">
      <div class="summary-grid">
        <div class="summary-item">
          <div class="summary-label">実働日数 / 予定稼働日数</div>
          <div id="sumWorkDays" class="summary-value tabnums">-</div>
        </div>
        <div class="summary-item">
          <div class="summary-label">総勤務時間</div>
          <div id="sumTotalHours" class="summary-value tabnums">-</div>
        </div>
        <div class="summary-item">
          <div class="summary-label">定時勤務時間</div>
          <div id="sumRegularHours" class="summary-value tabnums">-</div>
        </div>
        <div class="summary-item">
          <div class="summary-label">残業時間</div>
          <div id="sumOverHours" class="summary-value tabnums">-</div>
        </div>
        <div class="summary-item">
          <div class="summary-label">定時給料</div>
          <div id="sumRegularPay" class="summary-value tabnums">-</div>
        </div>
        <div class="summary-item">
          <div class="summary-label">残業代</div>
          <div id="sumOverPay" class="summary-value tabnums">-</div>
        </div>
        <div class="summary-item summary-item-wide">
          <div class="summary-label summary-label-totalpay">
            <span class="summary-label-primary">総支給額</span>
            <span class="summary-label-separator"> / </span>
            <span class="summary-label-secondary">予定総支給額</span>
          </div>
          <div id="sumTotalPay" class="summary-value tabnums">-</div>
        </div>
      </div>
    </section>

    <section class="days" aria-label="日別一覧">
      <div id="daysContainer" class="days-container"></div>
    </section>
  </main>

  <dialog id="settingsDialog" class="dialog">
    <form method="dialog" class="dialog-card">
      <div class="dialog-header">
        <div class="dialog-title">設定</div>
        <button class="dialog-close" value="cancel" aria-label="閉じる" type="submit">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18" stroke="#4b5563" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div class="dialog-body">
        <div class="field-row">
          <label class="field-label" for="yearInput">対象年</label>
          <input id="yearInput" class="field-input tabnums" type="number" inputmode="numeric" min="2000" max="2099" />
        </div>

        <div class="divider"></div>

        <div class="section-title">会社休日</div>

        <div class="field-row">
          <label class="field-label" for="companyHolidayDate">日付</label>
          <input id="companyHolidayDate" class="field-input" type="date" />
          <button id="addCompanyHoliday" class="btn" type="button">追加</button>
        </div>
        <div class="field-row">
          <label class="field-label" for="companyHolidayName">会社休日名</label>
          <input id="companyHolidayName" class="field-input" type="text" maxlength="40" placeholder="例: 創立記念日" />
        </div>

        <div id="companyHolidayList" class="company-holiday-list" aria-label="会社休日一覧"></div>

        <div class="divider"></div>

        <div class="section-title">時給</div>
        <div class="field-row">
          <label class="field-label" for="hourlyWageInput">時給</label>
          <input id="hourlyWageInput" class="field-input tabnums" type="number" inputmode="numeric" min="0" step="1" />
          <button id="saveWage" class="btn" type="button">保存</button>
        </div>

        <div class="divider"></div>

        <div class="section-title">データ</div>
        <div class="field-row backup-action-row">
          <button id="exportData" class="btn subtle backup-action-btn" type="button">バックアップ文字列を作成</button>
        </div>
        <textarea id="backupText" class="backup-text" rows="4" spellcheck="false"></textarea>
        <div class="field-row backup-action-row backup-action-row-split">
          <button id="copyBackup" class="btn subtle backup-action-btn" type="button">文字列をコピー</button>
          <button id="importData" class="btn subtle backup-action-btn" type="button">バックアップ文字列を復元</button>
        </div>

        <div class="divider"></div>

        <div class="section-title">画像設定</div>
        <div class="field-note">画像はこの端末に保存されます。バックアップ文字列には含まれません。</div>
        <div id="reactionImageList" class="reaction-image-list" aria-label="リアクション画像設定"></div>
      </div>

      <div class="dialog-footer">
        <button class="btn" value="default" type="submit">閉じる</button>
      </div>
    </form>
  </dialog>

  <dialog id="categoryDialog" class="dialog dialog-compact">
    <div class="dialog-card">
      <div class="dialog-header">
        <div class="dialog-title">勤怠区分を選択</div>
        <button id="categoryDialogClose" class="dialog-close" aria-label="閉じる" type="button">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18" stroke="#4b5563" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="dialog-body">
        <div class="field-note">反映したい区分をボタンで選べます。</div>
        <div id="categoryDialogOptions" class="category-dialog-options" aria-label="勤怠区分一覧"></div>
      </div>
    </div>
  </dialog>

  <dialog id="yearSummaryDialog" class="dialog">
    <form method="dialog" class="dialog-card">
      <div class="dialog-header">
        <div id="yearSummaryTitle" class="dialog-title tabnums">2026年まとめ</div>
        <button class="dialog-close" value="cancel" aria-label="閉じる" type="submit">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18" stroke="#4b5563" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="dialog-body">
        <div class="field-note">予定総支給額は、残業などを含まない定時ベースの金額です。</div>
        <div id="yearSummaryList" class="year-summary-list" aria-label="年次まとめ一覧"></div>
      </div>
      <div class="dialog-footer">
        <button class="btn" value="default" type="submit">閉じる</button>
      </div>
    </form>
  </dialog>

  <div id="quickMessage" class="quick-message" role="status" aria-live="polite"></div>
  <div id="reactionOverlay" class="reaction-overlay" aria-live="polite" aria-atomic="true">
    <div class="reaction-overlay-card">
      <img id="reactionOverlayImage" class="reaction-overlay-image" alt="" hidden />
      <div id="reactionOverlayText" class="reaction-overlay-text" hidden></div>
    </div>
  </div>

  <script src="javascript.js"></script>
</body>
</html>
